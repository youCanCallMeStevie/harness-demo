<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Harness</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <script defer src="brand.js"></script>
  <script defer src="rebrand-panel.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(0,173,228,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(107,64,245,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease forwards;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .login-logo-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo-icon svg { width: 24px; height: 24px; fill: #fff; }
    .login-logo-name {
      font-family: var(--font-display);
      font-weight: var(--weight-bold);
      font-size: 1.4rem;
      color: var(--color-text);
    }

    .login-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: var(--weight-bold);
      color: var(--color-text);
      margin-bottom: 0.35rem;
    }
    .login-subtitle {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }

    /* SSO Button */
    .sso-btn {
      width: 100%;
      padding: 11px;
      background: var(--color-bg-elevated);
      border: 1.5px solid var(--color-border-light);
      border-radius: var(--radius-md);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: var(--weight-medium);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.18s;
      text-decoration: none;
      margin-bottom: 1.5rem;
    }
    .sso-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-bg-elevated);
    }
    .sso-btn svg { width: 18px; height: 18px; }

    .divider-or {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .divider-or::before, .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .divider-or span {
      font-size: 0.78rem;
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .login-form { display: flex; flex-direction: column; gap: 1.1rem; }

    .forgot-link {
      font-size: 0.82rem;
      color: var(--color-primary);
      text-align: right;
      display: block;
      margin-top: -6px;
    }

    .login-submit {
      width: 100%;
      padding: 13px;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all 0.18s;
      margin-top: 0.5rem;
    }
    .login-submit:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,173,228,0.25);
    }
    .login-submit:active { transform: translateY(0); }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.84rem;
      color: var(--color-text-muted);
    }
    .login-footer a { color: var(--color-primary); }

    /* Trust badges */
    .trust-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2.5rem;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    .trust-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--color-text-faint);
    }
    .trust-badge svg { width: 14px; height: 14px; opacity: 0.5; }

    /* Demo notice */
    .demo-banner {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-light);
      border-left: 3px solid var(--color-primary);
      border-radius: var(--radius-md);
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      z-index: 999;
    }
    .demo-banner strong { color: var(--color-primary); }

    /* Loading state */
    .login-submit.loading {
      opacity: 0.7;
      cursor: wait;
    }
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="demo-banner">
    🎯 <strong>Demo Mode</strong> — Use any credentials
  </div>

  <div class="login-wrapper">
    <div class="login-header">
      <div class="login-logo">
        <div class="login-logo-icon">
          <!-- Logo: replace src with customer logo or keep SVG icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="login-logo-name">Harness</span>
      </div>
    </div>

    <div class="login-card">
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to your account to continue</p>

      <!-- SSO Option -->
      <a href="dashboard.html" class="sso-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Continue with SSO
      </a>

      <div class="divider-or"><span>or</span></div>

      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@company.com" value="demo@company.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" value="demo1234">
          <a href="#" class="forgot-link" onclick="return false">Forgot password?</a>
        </div>

        <button type="submit" class="login-submit" id="loginBtn">
          <span class="spinner" id="spinner"></span>
          Sign in
        </button>
      </form>

      <div class="login-footer">
        Don't have an account? <a href="#">Contact your admin</a>
      </div>
    </div>

    <div class="trust-badges">
      <span class="trust-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        SOC 2 Type II
      </span>
      <span class="trust-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        256-bit Encryption
      </span>
      <span class="trust-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        GDPR Compliant
      </span>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      btn.classList.add('loading');
      spinner.style.display = 'inline-block';
      btn.lastChild.textContent = ' Signing in…';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }
  </script>
</body>
</html>
